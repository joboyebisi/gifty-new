name: gifty-indexer
description: Indexer for Gifty Agentic Real Estate on Circle Arc Testnet
networks:
- id: 5042002
  rpc_config:
    url: https://rpc.testnet.arc.network
  start_block: 0 
  contracts:
  - name: FractionalProperty
    address: 0x149F452265bC3a3958aA505a46B2d2e1bdfBf1D6
    handler: src/EventHandlers.ts
    events:
    - event: PropertyListed(uint256 indexed propertyId, uint256 pricePerShare)
    - event: SharesPurchased(uint256 indexed propertyId, address indexed buyer, uint256 amount)
  - name: SavingsVault
    address: 0x0113c0bA806874e409B9dB700563B25cC10167C9
    handler: src/EventHandlers.ts
    events:
    - event: Saved(address indexed user, uint256 indexed propertyId, uint256 amount)
    - event: Withdrawn(address indexed user, uint256 indexed propertyId, uint256 amount)
